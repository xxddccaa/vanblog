services:
  caddy:
    image: ${VANBLOG_DOCKER_REPO:-kevinchina/deeplearning}:vanblog-caddy-${VANBLOG_RELEASE_SUFFIX:-latest}
    restart: always
    depends_on:
      server:
        condition: service_healthy
      website:
        condition: service_healthy
      admin:
        condition: service_healthy
      waline:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      EMAIL: ${EMAIL:-someone@example.com}
    volumes:
      - ${VANBLOG_LOG_DIR:-./log}:/var/log
      - ${VANBLOG_CADDY_CONFIG_DIR:-./caddy/config}:/root/.config/caddy
      - ${VANBLOG_CADDY_DATA_DIR:-./caddy/data}:/root/.local/share/caddy
    ports:
      - ${VANBLOG_HTTP_PORT:-80}:80
      - ${VANBLOG_HTTPS_PORT:-443}:443

  server:
    image: ${VANBLOG_DOCKER_REPO:-kevinchina/deeplearning}:vanblog-server-${VANBLOG_RELEASE_SUFFIX:-latest}
    restart: always
    init: true
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: production
      VAN_BLOG_DATABASE_URL: ${VAN_BLOG_DATABASE_URL:-mongodb://mongo:27017/vanBlog?authSource=admin}
      VAN_BLOG_WALINE_DB: ${VAN_BLOG_WALINE_DB:-waline}
      VANBLOG_CADDY_API_URL: http://caddy:2019
      VANBLOG_WEBSITE_CONTROL_URL: http://website:3011
      VANBLOG_WALINE_CONTROL_URL: http://waline:8361
      VANBLOG_WEBSITE_ISR_BASE: http://website:3001/api/revalidate?path=
    volumes:
      - ${VANBLOG_STATIC_DIR:-./data/static}:/app/static
      - ${VANBLOG_LOG_DIR:-./log}:/var/log
      - ${VANBLOG_ALIYUNPAN_CONFIG_DIR:-./aliyunpan/config}:/root/.config/aliyunpan
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/swagger || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  website:
    image: ${VANBLOG_DOCKER_REPO:-kevinchina/deeplearning}:vanblog-website-${VANBLOG_RELEASE_SUFFIX:-latest}
    restart: always
    init: true
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: production
      PORT: 3001
      WEBSITE_CONTROL_PORT: 3011
      VAN_BLOG_SERVER_URL: http://server:3000
      VAN_BLOG_REVALIDATE: "false"
      VAN_BLOG_ALLOW_DOMAINS: ${VAN_BLOG_ALLOW_DOMAINS:-pic.mereith.com}
    expose:
      - "3001"
      - "3011"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3011/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  admin:
    image: ${VANBLOG_DOCKER_REPO:-kevinchina/deeplearning}:vanblog-admin-${VANBLOG_RELEASE_SUFFIX:-latest}
    restart: always
    expose:
      - "3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3002/admin/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  waline:
    image: ${VANBLOG_DOCKER_REPO:-kevinchina/deeplearning}:vanblog-waline-${VANBLOG_RELEASE_SUFFIX:-latest}
    restart: always
    init: true
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: production
      PORT: 8360
      WALINE_CONTROL_PORT: 8361
      MONGO_HOST: ${WALINE_MONGO_HOST:-mongo}
      MONGO_PORT: ${WALINE_MONGO_PORT:-27017}
      MONGO_DB: ${VAN_BLOG_WALINE_DB:-waline}
      MONGO_AUTHSOURCE: admin
      JWT_TOKEN: ${WALINE_JWT_TOKEN:-vanblog-change-me}
    expose:
      - "8360"
      - "8361"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8361/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:4.4.16
    restart: always
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${VANBLOG_MONGO_DIR:-./data/mongo}:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongo --quiet --eval 'db.adminCommand(\"ping\").ok' | grep 1 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
