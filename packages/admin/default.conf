server {
    listen 3002;
    # gzip config
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;

    location = /admin {
        return 301 /admin/;
    }

    # Always revalidate the admin shell so browsers pick up the latest hashed assets after a rebuild.
    location = /admin/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Built assets are content-hashed, so they can be cached aggressively.
    location ~* ^/admin/.*\.(?:js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /admin/ {
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
}
