name: manual-release-images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.54.0. Leave empty to use package.json version.'
        required: false
        type: string
      image_id:
        description: 'Optional release image id. Leave empty to use the current commit short SHA.'
        required: false
        type: string
      push:
        description: 'Push images to Docker Hub'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  docker-release:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: kevinchina/deeplearning
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Pre-pull Node build images
        run: |
          docker pull node:24.14.1
          docker pull node:24.14.1-alpine

      - name: Run full regression suite
        run: pnpm test:full

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build split images
        shell: bash
        run: |
          args=(--repo "${IMAGE_REPO}")
          if [[ -n "${{ inputs.version }}" ]]; then
            args+=(--version "${{ inputs.version }}")
          fi
          if [[ -n "${{ inputs.image_id }}" ]]; then
            args+=(--image-id "${{ inputs.image_id }}")
          fi
          if [[ "${{ inputs.push }}" == 'true' ]]; then
            args+=(--push)
          fi
          bash scripts/release-images.sh "${args[@]}"
