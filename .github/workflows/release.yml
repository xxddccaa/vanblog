name: release-images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  docker-release:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: kevinchina/deeplearning
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: true

      - name: Pre-pull Node build images
        run: |
          docker pull node:24.14.1
          docker pull node:24.14.1-alpine

      - name: Run full regression suite
        run: pnpm test:full

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push split images
        run: |
          bash scripts/release-images.sh \
            --version "${GITHUB_REF_NAME}" \
            --image-id "${GITHUB_SHA::8}" \
            --repo "${IMAGE_REPO}" \
            --push
